<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made with PDF-DS Watermark</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Force 4K resolution (3840x2160) */
            width: 3840px;
            height: 2160px;
            background-color: #050505; /* Deep, premium dark background */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.04) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevent scrolling */
        }

        .watermark-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Subtle glassmorphism effect */
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 80px 160px;
            border-radius: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .watermark-text {
            font-size: 140px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4); /* Semi-transparent watermark feel */
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .highlight {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Decorative logo element */
        .logo-icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.0));
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .logo-icon::before {
            content: '';
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>

    <div class="watermark-container">
        <div class="watermark-text">
            <div class="logo-icon"></div>
            <span>made with <span class="highlight">PDF-DS</span></span>
        </div>
    </div>

</body>
</html>
