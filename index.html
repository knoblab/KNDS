<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  
  <!-- PWA Manifest & App Icons -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ad1d1d" />

  <!-- iOS PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PDF-DS Editor" />
  <link rel="apple-touch-icon" href="/pwa_logo.png" />

  <title>PDF-DS 가이드라인</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => {
            console.log('PDF-DS Service Worker registered scope:', reg.scope);
          })
          .catch((err) => {
            console.log('PDF-DS Service Worker registration failed:', err);
          });
      });
    }
  </script>
</body>

</html>
