name: Create Release ZIP

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v2.1.3 등 태그 push 시 실행

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (no .git history)
        uses: actions/checkout@v4
        with:
          path: source

      - name: Prepare clean release
        run: |
          mkdir -p release/PDF-DS
          
          # .git 및 불필요한 파일을 제외하고 복사
          rsync -av --progress source/ release/PDF-DS/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.wrangler' \
            --exclude '.env' \
            --exclude '.dev.vars' \
            --exclude '.DS_Store'
          
          # ZIP 생성
          cd release
          zip -r ../PDF-DS-${{ github.ref_name }}.zip PDF-DS/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PDF-DS-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## 📦 다운로드
            
            아래 ZIP 파일을 다운로드하세요. Git 연동 없이 바로 사용할 수 있습니다.
            
            ### 사용 방법
            1. ZIP 파일을 다운로드하고 압축을 해제합니다.
            2. `npm install`을 실행합니다.
            3. `npm run dev`로 개발 서버를 시작합니다.
